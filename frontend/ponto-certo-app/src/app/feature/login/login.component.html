<div class="auth-page d-flex align-items-center justify-content-center min-vh-100 bg-light">
  <div class="auth-card card border-0 shadow-sm w-100" style="max-width: 420px">
    <div class="card-body p-4 p-md-5">

      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center gap-2 text-primary mb-3">
          <i class="bi bi-bus-front-fill fs-1"></i>
        </div>
        <h1 class="fs-3 fw-bold mb-1">Ponto Certo</h1>
        <p class="text-muted small">Consulta de ônibus em tempo real</p>
      </div>

      <form (submit)="entrar($event)" novalidate>

        @if (erro) {
          <div class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-circle me-1"></i>{{ erro }}
          </div>
        }

        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">E-mail</label>
          <input
            id="email"
            type="email"
            class="form-control form-control-lg"
            placeholder="seu@email.com"
            [(ngModel)]="email"
            name="email"
            autocomplete="email"
          />
        </div>

        <div class="mb-4">
          <label for="senha" class="form-label fw-semibold">Senha</label>
          <input
            id="senha"
            type="password"
            class="form-control form-control-lg"
            placeholder="Sua senha"
            [(ngModel)]="senha"
            name="senha"
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg" [disabled]="carregando">
          @if (carregando) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            Entrando...
          } @else {
            Entrar
          }
        </button>

      </form>

      <hr class="my-4" />

      <p class="text-center text-muted small mb-0">
        Não tem uma conta?
        <a routerLink="/cadastro" class="fw-semibold text-primary text-decoration-none">
          Criar nova conta
        </a>
      </p>

    </div>
  </div>
</div>
